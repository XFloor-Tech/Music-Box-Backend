basePath: /
definitions:
  auth.AuthErrorResponse:
    properties:
      error:
        example: authentication required
        type: string
      status:
        example: failure
        type: string
      success:
        example: false
        type: boolean
    type: object
  auth.AuthResponse:
    properties:
      data:
        $ref: '#/definitions/auth.AuthResponseData'
      status:
        example: success
        type: string
      success:
        example: true
        type: boolean
    type: object
  auth.AuthResponseData:
    properties:
      session:
        $ref: '#/definitions/auth.AuthSessionResponse'
      user:
        $ref: '#/definitions/auth.AuthUserResponse'
    type: object
  auth.AuthSessionResponse:
    properties:
      expires_at:
        type: string
    type: object
  auth.AuthUserResponse:
    properties:
      email:
        example: user@example.com
        type: string
      email_verified:
        example: false
        type: boolean
      id:
        example: usr_abc123
        type: string
      name:
        example: user
        type: string
    type: object
  auth.LogoutResponse:
    properties:
      data:
        $ref: '#/definitions/auth.LogoutResponseData'
      status:
        example: success
        type: string
      success:
        example: true
        type: boolean
    type: object
  auth.LogoutResponseData:
    type: object
  auth.SigninRequest:
    properties:
      email:
        example: user@example.com
        type: string
      password:
        example: P@ssw0rd1
        maxLength: 72
        type: string
    required:
    - email
    - password
    type: object
  auth.SignupRequest:
    properties:
      confirm_password:
        example: P@ssw0rd1
        type: string
      email:
        example: user@example.com
        type: string
      password:
        example: P@ssw0rd1
        maxLength: 72
        minLength: 8
        type: string
    required:
    - confirm_password
    - email
    - password
    type: object
  server.healthResponse:
    properties:
      data:
        $ref: '#/definitions/server.healthResponseData'
      status:
        example: ok
        type: string
      success:
        example: true
        type: boolean
    type: object
  server.healthResponseData:
    properties:
      service:
        example: music-player
        type: string
    type: object
  track.Status:
    enum:
    - draft
    - uploading
    - processing
    - ready
    - failed
    - deleted
    type: string
    x-enum-varnames:
    - StatusDraft
    - StatusUploading
    - StatusProcessing
    - StatusReady
    - StatusFailed
    - StatusDeleted
  track.TrackDetailResponse:
    properties:
      data:
        $ref: '#/definitions/track.TrackDetailResponseData'
      status:
        example: success
        type: string
      success:
        example: true
        type: boolean
    type: object
  track.TrackDetailResponseData:
    properties:
      track:
        $ref: '#/definitions/track.TrackResponse'
    type: object
  track.TrackErrorResponse:
    properties:
      error:
        example: authentication required
        type: string
      status:
        example: failure
        type: string
      success:
        example: false
        type: boolean
    type: object
  track.TrackPaginationResponse:
    properties:
      has_more:
        example: false
        type: boolean
      limit:
        example: 20
        type: integer
      next_cursor:
        example: eyJjcmVhdGVkX2F0IjoiMjAyNi0wNi0xMVQxMjowMDowMFoiLCJpZCI6InRya18xMjMifQ
        type: string
    type: object
  track.TrackResponse:
    properties:
      album:
        example: Album title
        type: string
      artist:
        example: Artist name
        type: string
      created_at:
        type: string
      disc_number:
        example: 1
        type: integer
      duration_ms:
        example: 180000
        type: integer
      explicit:
        example: false
        type: boolean
      genre:
        example: electronic
        type: string
      id:
        example: trk_abc123
        type: string
      metadata:
        additionalProperties: {}
        type: object
      release_year:
        example: 2026
        type: integer
      status:
        allOf:
        - $ref: '#/definitions/track.Status'
        example: draft
      title:
        example: Song title
        type: string
      track_number:
        example: 1
        type: integer
      updated_at:
        type: string
      visibility:
        allOf:
        - $ref: '#/definitions/track.Visibility'
        example: private
    type: object
  track.TracksResponse:
    properties:
      data:
        $ref: '#/definitions/track.TracksResponseData'
      status:
        example: success
        type: string
      success:
        example: true
        type: boolean
    type: object
  track.TracksResponseData:
    properties:
      pagination:
        $ref: '#/definitions/track.TrackPaginationResponse'
      tracks:
        items:
          $ref: '#/definitions/track.TrackResponse'
        type: array
    type: object
  track.Visibility:
    enum:
    - private
    - unlisted
    - public
    type: string
    x-enum-varnames:
    - VisibilityPrivate
    - VisibilityUnlisted
    - VisibilityPublic
  user.MeResponse:
    properties:
      data:
        $ref: '#/definitions/user.MeResponseData'
      status:
        example: success
        type: string
      success:
        example: true
        type: boolean
    type: object
  user.MeResponseData:
    properties:
      user:
        $ref: '#/definitions/user.UserResponse'
    type: object
  user.UpdateMeRequest:
    properties:
      image:
        example: https://example.com/avatar.png
        type: string
      name:
        example: New display name
        type: string
    type: object
  user.UserErrorResponse:
    properties:
      error:
        example: authentication required
        type: string
      status:
        example: failure
        type: string
      success:
        example: false
        type: boolean
    type: object
  user.UserResponse:
    properties:
      email:
        example: user@example.com
        type: string
      email_verified:
        example: false
        type: boolean
      id:
        example: usr_abc123
        type: string
      image:
        example: https://example.com/avatar.png
        type: string
      name:
        example: user
        type: string
    type: object
info:
  contact: {}
  description: Backend service for the Music Box project.
  title: Music Box Backend API
  version: 0.1.0
paths:
  /health:
    get:
      description: Returns service health status.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/server.healthResponse'
      summary: Health check
      tags:
      - health
  /logout:
    delete:
      description: Clears the current database-backed session cookie.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.LogoutResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/auth.AuthErrorResponse'
      summary: Log out
      tags:
      - auth
  /me:
    get:
      description: Returns the authenticated user's profile.
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/user.MeResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/user.UserErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/user.UserErrorResponse'
      summary: Current user
      tags:
      - user
    patch:
      consumes:
      - application/json
      description: Updates provided profile fields for the authenticated user.
      parameters:
      - description: Profile update payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/user.UpdateMeRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/user.MeResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/user.UserErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/user.UserErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/user.UserErrorResponse'
      summary: Update current user
      tags:
      - user
  /signin:
    post:
      consumes:
      - application/json
      description: Authenticates a user with e-mail and password and sets an HttpOnly
        database-backed session cookie.
      parameters:
      - description: Signin payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/auth.SigninRequest'
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/auth.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/auth.AuthErrorResponse'
        "401":
          description: Unauthorized
          schema:
            $ref: '#/definitions/auth.AuthErrorResponse'
      summary: Sign in
      tags:
      - auth
  /signup:
    post:
      consumes:
      - application/json
      description: Registers a user with e-mail and password and sets an HttpOnly
        database-backed session cookie.
      parameters:
      - description: Signup payload
        in: body
        name: payload
        required: true
        schema:
          $ref: '#/definitions/auth.SignupRequest'
      produces:
      - application/json
      responses:
        "201":
          description: Created
          schema:
            $ref: '#/definitions/auth.AuthResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/auth.AuthErrorResponse'
      summary: Sign up
      tags:
      - auth
  /tracks:
    get:
      description: Returns tracks owned by the authenticated user.
      parameters:
      - description: Maximum tracks to return. Defaults to 20 and is capped at 100.
        in: query
        maximum: 100
        minimum: 1
        name: limit
        type: integer
      - description: Opaque cursor returned by a previous list response.
        in: query
        name: cursor
        type: string
      - description: Track status filter. Soft-deleted tracks are not returned.
        enum:
        - draft
        - uploading
        - processing
        - ready
        - failed
        in: query
        name: status
        type: string
      - description: Track visibility filter.
        enum:
        - private
        - unlisted
        - public
        in: query
        name: visibility
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/track.TracksResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/track.TrackErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/track.TrackErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/track.TrackErrorResponse'
      summary: List tracks
      tags:
      - tracks
  /tracks/{trackID}:
    get:
      description: Returns one track owned by the authenticated user.
      parameters:
      - description: Track ID
        in: path
        name: trackID
        required: true
        type: string
      produces:
      - application/json
      responses:
        "200":
          description: OK
          schema:
            $ref: '#/definitions/track.TrackDetailResponse'
        "400":
          description: Bad Request
          schema:
            $ref: '#/definitions/track.TrackErrorResponse'
        "403":
          description: Forbidden
          schema:
            $ref: '#/definitions/track.TrackErrorResponse'
        "404":
          description: Not Found
          schema:
            $ref: '#/definitions/track.TrackErrorResponse'
        "500":
          description: Internal Server Error
          schema:
            $ref: '#/definitions/track.TrackErrorResponse'
      summary: Get track
      tags:
      - tracks
schemes:
- http
swagger: "2.0"
